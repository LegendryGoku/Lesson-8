<!DOCTYPE html>
<html>
<head>
<title>Glass Gradient Card</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.card{
    width:320px;
    padding:30px;
    text-align:center;
    border-radius:15px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    color:white;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background: linear-gradient(to right, #ff7e5f, #feb47b);
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background: linear-gradient(to right, #36d1dc, #5b86e5);
}

</style>
</head>

<body>

<div class="card">
<h1>Gradient Glass Card</h1>
<p>This card uses CSS gradient and glass effect.</p>
<button>Explore</button>
</div>

</body>

</html>
